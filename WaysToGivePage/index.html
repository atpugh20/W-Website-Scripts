<style>
    .card-section {
        display: flex;
        justify-content: center;
        margin-left: auto;
        margin-right: auto;
        gap: 20px;
        padding: 10px;
        max-width: 1224px;
        flex-wrap: wrap;
        flex: 20%;
    }
    .card {
        background-color: white;
        padding: 30px;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        aspect-ratio: 17/20;
        max-width: 350px;
    }
    .card-third,
    .no-button-text {
        display: flex;
        flex-direction: column;
        align-items: start;
        justify-content: end;
        padding: 20px;
    }
    .card-third {
        height: 33%;
    }
    .no-button-text {
        height: 66%;
    }
    .card-text h3 {
        font-weight: bold;
    }
    .card-text p {
        font-size: 14px;
    }
    .card-image {
        width: 30%;
        margin-left: auto;
        margin-right: auto;
    }
    .card-button {
        display: inline-block;
        background-color: #e58e1a;
        padding: 10px;
        padding-left: 20px;
        padding-right: 20px;
        border-radius: 25px;
        text-wrap: nowrap;
    }
    .card:hover {
        background-color: #e58e1a;
        transition: 500ms;
        .card-button {
            background-color: white;
            transition: 500ms;
        }
        .card-text * {
            color: white;
            transition: 200ms;
        }
    }
</style>

<div id="card-section" class="card-section"></div>

<script>
    cardData = [
        {
            imageURL: "https://uscap.org/wp-content/uploads/2026/04/donate-img-orange.png",
            altImageURL: "https://uscap.org/wp-content/uploads/2026/04/donate-img-white.png",
            title: "Donate Online",
            description: "[Insert Description here]",
            buttonText: "Donate Today",
            link: "#",
        },
        {
            imageURL: "https://uscap.org/wp-content/uploads/2026/04/monthly-img-orange.png",
            altImageURL: "https://uscap.org/wp-content/uploads/2026/04/monthly-img-white.png",
            title: "Monthly Giving",
            description: "[Insert Description here]",
            buttonText: "Join the Club",
            link: "#",
        },
        {
            imageURL: "https://uscap.org/wp-content/uploads/2026/04/rose-img-orange.png",
            altImageURL: "https://uscap.org/wp-content/uploads/2026/04/rose-img-white.png",
            title: "Tribute / Memorial Gift",
            description: "[Insert Description here]",
            buttonText: "Donate Today",
            link: "#",
        },
        {
            imageURL: "https://uscap.org/wp-content/uploads/2026/04/stock-img-orange.png",
            altImageURL: "https://uscap.org/wp-content/uploads/2026/04/stock-img-white.png",
            title: "Stock or Wire Transfer",
            description: "[Insert Description here]",
            buttonText: "Learn More",
            link: "#",
        },

        {
            imageURL: "https://uscap.org/wp-content/uploads/2026/04/mail-img-orange.png",
            altImageURL: "https://uscap.org/wp-content/uploads/2026/04/mail-img-white.png",
            title: "Mail a Check",
            description: `Checks should be made payable to the United States and Canadian Academy of Pathology (USCAP) and mailed to:<br><br> 201 N Palm Canyon Drive Suite 301 Palm Springs, CA 92262`,
            buttonText: "",
            link: "#",
        },
        {
            imageURL: "https://uscap.org/wp-content/uploads/2026/04/present-img-orange.png",
            altImageURL: "https://uscap.org/wp-content/uploads/2026/04/present-img-white.png",
            title: "Donor-Advised Funds",
            description: "Support USCAP through your donor-advised fund.",
            buttonText: "Give now",
            link: "#",
        },
        {
            imageURL: "https://uscap.org/wp-content/uploads/2026/04/plant-img-orange.png",
            altImageURL: "https://uscap.org/wp-content/uploads/2026/04/plant-img-white.png",
            title: "Legacy Giving",
            description:
                "Leave a legacy at United States and Canadian Academy of Pathology by remembering us in your estate plans",
            buttonText: "Learn More",
            link: "#",
        },
    ];

    function CreateCard(imageURL, title, description, buttonText, buttonLink) {
        const cardTextClass = buttonText ? "card-third" : "no-button-text";

        return `
            <div class="card">
                <div class="card-third">
                    <img class="card-image" src="${imageURL}" />
                </div>
                <div class="card-text ${cardTextClass}">
                    <h3>${title}</h3>
                    <p>${description}</p>
                </div>
                ${
                    buttonText
                        ? ` <div class="card-third">
                        <div class="card-button">
                            <p>${buttonText}</p>
                        </div>
                    </div>`
                        : ""
                }
            </div>
        `;
    }

    function setCardImage(element, newURL) {
        element.src = newURL;
    }

    window.addEventListener("DOMContentLoaded", () => {
        const cardSection = document.getElementById("card-section");

        for (let card of cardData) {
            cardSection.innerHTML += CreateCard(
                card.imageURL,
                card.title,
                card.description,
                card.buttonText,
                card.link,
            );
        }

        const cardElements = document.getElementsByClassName("card");

        console.log(cardElements.length);
        console.log(cardData.length);

        for (let i = 0; i < cardElements.length; i++) {
            const image = cardElements[i].getElementsByClassName("card-image")[0];
            cardElements[i].addEventListener("mouseover", () => setCardImage(image, cardData[i].altImageURL));
            cardElements[i].addEventListener("mouseleave", () => setCardImage(image, cardData[i].imageURL));
        }
    });
</script>
